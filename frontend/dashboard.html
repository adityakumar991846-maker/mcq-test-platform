<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #4facfe, #00f2fe);
            min-height: 100vh;
        }

        nav {
            background: white;
            padding: 20px 50px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        nav h2 {
            color: #007bff;
        }

        nav button {
            padding: 10px 18px;
            border: none;
            background: red;
            color: white;
            border-radius: 8px;
            cursor: pointer;
        }

        .dashboard {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 80vh;
        }

        .card {
            background: white;
            padding: 40px;
            border-radius: 20px;
            width: 500px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        h1 {
            margin-bottom: 20px;
        }

        .btn {
            display: block;
            width: 100%;
            margin: 15px 0;
            padding: 14px;
            background: #007bff;
            color: white;
            text-decoration: none;
            border-radius: 10px;
            font-size: 18px;
        }

        .btn:hover {
            background: #0056b3;
        }
    </style>
</head>
<body>

<nav>
    <h2>MCQ Test Platform</h2>
    <button onclick="logout()">Logout</button>
</nav>

<div class="dashboard">
    <div class="card">
        <h1>Welcome, <span id="username"></span></h1>

        <a href="mcq-input.html" class="btn">Start Test</a>
        <a href="history.html" class="btn">View History</a>
    </div>
</div>

<script>
    const userName = localStorage.getItem("userName");

    if (!userName) {
        window.location.href = "login.html";
    }

    document.getElementById("username").innerText = userName;

    function logout() {
        localStorage.clear();
        window.location.href = "login.html";
    }
</script>

</body>
</html>
