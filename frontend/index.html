<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MCQ Test Generator</title>
    <link rel="stylesheet" href="style.css">
</head>
<script>
function startApp() {
    const userId = localStorage.getItem("userId");

    if (userId) {
        window.location.href = "dashboard.html";
    } else {
        window.location.href = "login.html";
    }
}
</script>
<body>

    <div class="home-container">
        <div class="home-card">
            <h1>MCQ Test Generator</h1>
            <p>
                Convert your MCQs into a live exam instantly.
                Paste questions with answers, set timer, and start your customized test.
            </p>

            <a href="mcq-input.html">
                <<button onclick="startApp()">Start Test</button>
            </a>
        </div>
    </div>

</body>
</html>
